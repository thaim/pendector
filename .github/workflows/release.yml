name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Songmu/tagpr@v1
        id: tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    needs: tagpr
    if: ${{ needs.tagpr.outputs.tag != '' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pendector
            asset_name: pendector-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pendector
            asset_name: pendector-macos-aarch64

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tagpr.outputs.tag }}

    - run: rustup target add ${{ matrix.target }}

    - uses: swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - run: cargo build --release --target ${{ matrix.target }}

    - run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} target/${{ matrix.target }}/release/${{ matrix.asset_name }}

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.tagpr.outputs.tag }}
        files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
